<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>BetterDLP Test Suite</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F9FAFB; padding: 32px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #6B7280; font-size: 13px; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card {
    background: #fff; border: 1px solid #E5E7EB; border-radius: 10px;
    padding: 16px; transition: border-color 0.2s;
  }
  .card.running { border-color: #6366F1; }
  .card.blocked { border-color: #EF4444; background: #FEF2F2; }
  .card.allowed { border-color: #10B981; background: #F0FDF4; }
  .card.error { border-color: #F59E0B; background: #FFFBEB; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-name { font-weight: 700; font-size: 14px; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    background: #E5E7EB; color: #374151;
  }
  .badge.BLOCKED { background: #FEE2E2; color: #991B1B; }
  .badge.ALLOWED { background: #D1FAE5; color: #065F46; }
  .badge.RUNNING { background: #EDE9FE; color: #5B21B6; }
  .badge.ERROR { background: #FEF3C7; color: #92400E; }
  .card-file { font-size: 12px; color: #6B7280; font-family: monospace; margin-bottom: 6px; }
  .card-expect { font-size: 12px; color: #6B7280; margin-bottom: 6px; }
  .card-result { font-size: 12px; color: #374151; font-style: italic; min-height: 18px; }
  .card-pass { font-size: 12px; font-weight: 700; margin-top: 8px; }
  .card-pass.pass { color: #065F46; }
  .card-pass.fail { color: #991B1B; }
  .summary {
    background: #fff; border: 1px solid #E5E7EB; border-radius: 10px;
    padding: 20px; display: flex; gap: 32px; align-items: center;
  }
  .sum-stat { text-align: center; }
  .sum-val { font-size: 32px; font-weight: 700; }
  .sum-val.green { color: #10B981; }
  .sum-val.red { color: #EF4444; }
  .sum-val.gray { color: #6B7280; }
  .sum-label { font-size: 12px; color: #6B7280; }
  .run-btn {
    margin-left: auto; padding: 10px 24px; background: #111827; color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
</style>
</head>
<body>
<h1>🛡️ BetterDLP Test Suite</h1>
<p class="subtitle">Validates the core file detection engine — magic bytes, ZIP inspection, encryption detection</p>

<div class="summary" id="summary" style="margin-bottom:28px;">
  <div class="sum-stat"><div class="sum-val gray" id="s-total">—</div><div class="sum-label">Total</div></div>
  <div class="sum-stat"><div class="sum-val green" id="s-pass">—</div><div class="sum-label">Passed</div></div>
  <div class="sum-stat"><div class="sum-val red" id="s-fail">—</div><div class="sum-label">Failed</div></div>
  <button class="run-btn" id="run-btn" onclick="runAll()">Run Tests</button>
</div>

<h2>Test Cases</h2>
<div class="grid" id="grid"></div>

<script src="jszip.min.js"></script>
<script src="detector-standalone.js"></script>
<script>
const TESTS = [
  { name: 'Real DOCX',            file: 'real.docx',              expect: 'BLOCKED', why: 'Office document — ZIP with word/document.xml' },
  { name: 'DOCX renamed to .jpg', file: 'photo_disguised.jpg',    expect: 'BLOCKED', why: 'Magic bytes reveal it is still a ZIP/Office file' },
  { name: 'Clean ZIP (images)',   file: 'clean_photos.zip',       expect: 'ALLOWED', why: 'ZIP with only PNG files — no documents inside' },
  { name: 'ZIP with DOCX inside', file: 'archive_with_doc.zip',   expect: 'BLOCKED', why: 'ZIP inspection finds word/document.xml inside' },
  { name: 'Encrypted ZIP',        file: 'encrypted.zip',          expect: 'BLOCKED', why: 'Encryption bit set — cannot verify contents' },
  { name: 'PDF',                  file: 'document.pdf',           expect: 'BLOCKED', why: '%PDF magic bytes' },
  { name: 'Legacy DOC (OLE2)',    file: 'legacy.doc',             expect: 'BLOCKED', why: 'OLE2 magic bytes D0 CF 11 E0' },
  { name: 'RAR Archive',          file: 'archive.rar',            expect: 'BLOCKED', why: 'RAR magic bytes — cannot inspect' },
  { name: 'Real PNG Image',       file: 'real_image.png',         expect: 'ALLOWED', why: 'PNG magic bytes — not a document' },
  { name: 'Nested ZIP (doc)',     file: 'nested.zip',             expect: 'BLOCKED', why: 'Recursive inspection finds DOCX inside inner ZIP' },
];

// Render cards
const grid = document.getElementById('grid');
TESTS.forEach((t, i) => {
  grid.innerHTML += `
    <div class="card" id="card-${i}">
      <div class="card-header">
        <span class="card-name">${t.name}</span>
        <span class="badge" id="badge-${i}">PENDING</span>
      </div>
      <div class="card-file">${t.file}</div>
      <div class="card-expect">Expected: <strong>${t.expect}</strong> — ${t.why}</div>
      <div class="card-result" id="result-${i}"></div>
      <div class="card-pass" id="pass-${i}"></div>
    </div>`;
});

async function fetchAsFile(filename) {
  const resp = await fetch(filename);
  const blob = await resp.blob();
  return new File([blob], filename, { type: blob.type });
}

async function runAll() {
  document.getElementById('run-btn').disabled = true;
  let passed = 0, failed = 0;

  for (let i = 0; i < TESTS.length; i++) {
    const t = TESTS[i];
    const card = document.getElementById('card-' + i);
    const badge = document.getElementById('badge-' + i);
    const resultEl = document.getElementById('result-' + i);
    const passEl = document.getElementById('pass-' + i);

    card.className = 'card running';
    badge.className = 'badge RUNNING';
    badge.textContent = 'RUNNING';

    try {
      const file = await fetchAsFile(t.file);
      const result = await BetterDLPDetector.inspectFile(file);
      const actual = result.blocked ? 'BLOCKED' : 'ALLOWED';
      const ok = actual === t.expect;

      card.className = 'card ' + actual.toLowerCase();
      badge.className = 'badge ' + actual;
      badge.textContent = actual;
      resultEl.textContent = result.reason || 'No reason';
      passEl.className = 'card-pass ' + (ok ? 'pass' : 'fail');
      passEl.textContent = ok ? '✓ PASS' : `✗ FAIL — expected ${t.expect}`;

      if (ok) passed++; else failed++;
    } catch (err) {
      card.className = 'card error';
      badge.className = 'badge ERROR';
      badge.textContent = 'ERROR';
      resultEl.textContent = err.message;
      passEl.className = 'card-pass fail';
      passEl.textContent = '✗ ERROR';
      failed++;
    }

    document.getElementById('s-total').textContent = i + 1;
    document.getElementById('s-pass').textContent = passed;
    document.getElementById('s-fail').textContent = failed;
    await new Promise(r => setTimeout(r, 80));
  }

  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = 'Run Again';
}
</script>
</body>
</html>
